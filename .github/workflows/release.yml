name: release

# Triggered when a `vX.Y.Z` tag is pushed. Two artifacts go out:
#
#   1. cedn library JAR  → Clojars (com.github.franks42/cedn)
#   2. cedn CLI script    → GitHub Release asset (cedn-vX.Y.Z)
#
# The CLI references the library via Maven coord, so the library
# MUST be on Clojars before the CLI artifact is reachable to end
# users. We deploy the library first, wait for Clojars indexing,
# smoke-test the CLI in a clean directory (forcing add-deps to
# resolve from Clojars), then upload the CLI as a release asset.
#
# Required secrets:
#   CLOJARS_USERNAME, CLOJARS_PASSWORD — Clojars deploy token.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bb, clj, clj-kondo, cljfmt
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          bb: 'latest'
          cli: 'latest'
          clj-kondo: 'latest'
          cljfmt: 'latest'

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Refuse to release a non-stable version
        run: bb release-check

      - name: Verify bin/cedn version matches tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          SCRIPT_VER=$(grep -oE '\(def version\s+"[^"]+"' bin/cedn \
                       | grep -oE '"[^"]+"$' | tr -d '"')
          if [ "$SCRIPT_VER" != "$VERSION" ]; then
            echo "::error::Tag is v${VERSION} but bin/cedn version is \"${SCRIPT_VER}\""
            exit 1
          fi
          echo "Tag and bin/cedn version agree: $VERSION"

      - name: Verify build.clj version matches tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          BUILD_VER=$(grep -oE '\(def version\s+"[^"]+"' build.clj \
                      | grep -oE '"[^"]+"$' | tr -d '"')
          if [ "$BUILD_VER" != "$VERSION" ]; then
            echo "::error::Tag is v${VERSION} but build.clj version is \"${BUILD_VER}\""
            exit 1
          fi
          echo "Tag and build.clj version agree: $VERSION"

      - name: Prefetch project deps
        # Populates ~/.m2 with the project's main :deps (org.clojure/clojure
        # 1.12.0 etc.) so tools.build/create-basis can resolve them later.
        # `clj -T:build deploy` runs in tool mode, which has its own
        # classpath; without this prefetch, the basis resolution inside
        # build.clj fails with "Could not find artifact org.clojure/clojure".
        run: clojure -P

      - name: Run library tests (bb)
        run: bb test:bb

      - name: Run CLI tests (dev mode)
        run: bb test:cli

      - name: Lint
        run: bb lint

      - name: Format check
        run: bb fmt

      - name: Publish library to Clojars
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: clojure -T:build deploy

      - name: Wait for Clojars indexing
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          for i in $(seq 1 30); do
            if curl -sfL "https://repo.clojars.org/com/github/franks42/cedn/$VERSION/cedn-$VERSION.jar" -o /dev/null; then
              echo "Clojars indexed cedn $VERSION"
              exit 0
            fi
            echo "Waiting for Clojars indexing... ($i/30)"
            sleep 10
          done
          echo "::error::Clojars indexing didn't complete within 5 minutes"
          exit 1

      - name: Smoke-test CLI in clean release mode
        run: |
          # Copy bin/cedn to an isolated temp dir with no adjacent src/
          # so the script's path-detection branches into add-deps. With
          # the runner's empty ~/.m2, this forces a real Clojars fetch —
          # catches "I deployed a JAR that's somehow not actually
          # resolvable" issues that local-only testing would miss.
          mkdir -p /tmp/cedn-smoke
          cp bin/cedn /tmp/cedn-smoke/
          cd /tmp/cedn-smoke
          out=$(./cedn --edn '{:b 2 :a 1}')
          if [ "$out" != "{:a 1 :b 2}" ]; then
            echo "::error::Release-mode CLI smoke test failed."
            echo "Expected: '{:a 1 :b 2}'"
            echo "Got:      '$out'"
            exit 1
          fi
          echo "OK: CLI resolved cedn from Clojars and produced canonical output"

      - name: Build versioned asset
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          mkdir -p /tmp/release
          cp bin/cedn "/tmp/release/cedn-${TAG}"
          chmod +x "/tmp/release/cedn-${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          gh release create "$TAG" "/tmp/release/cedn-$TAG" \
            --title "$TAG" \
            --generate-notes
